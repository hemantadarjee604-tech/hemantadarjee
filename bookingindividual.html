            <span class="navbar-toggler-icon"></span>

            <ul class="navbar-nav ms-auto">

<!-- HERO SECTION -->
<section class="hero-booking">
    <div class="content">
        <h1 class="display-4 fw-bold">Book a Service</h1>
        <p>Schedule grooming, vet visits, boarding, or training for your pet.</p>
    </div>
</section>

<!-- BOOKING FORM -->
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="booking-form">
                <h2 class="text-center mb-4">Booking Form</h2>

                <form>

                    <div class="mb-3">
                        <label class="form-label">Owner Name</label>
                        <input type="text" class="form-control" placeholder="Enter your name">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Pet Name</label>
                        <input type="text" class="form-control" placeholder="Enter pet name">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Pet Type</label>
                        <select class="form-select">
                            <option>Dog</option>
                            <option>Cat</option>
                            <option>Bird</option>
                            <option>Rabbit</option>
                            <option>Other</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Choose Service</label>
                        <select class="form-select">
                            <option>Pet Grooming</option>
                            <option>Veterinary Care</option>
                            <option>Pet Boarding</option>
                            <option>Pet Training</option>
                            <option>Pet Adoption Support</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Booking Date</label>
                        <input type="date" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Phone Number</label>
                        <input type="tel" class="form-control" placeholder="Enter phone number">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Additional Notes</label>
                        <textarea class="form-control" rows="4" placeholder="Write any special instructions here"></textarea>
                    </div>

                    <div class="text-center">
                        <button type="submit" class="btn btn-primary px-5">
                            Confirm Booking
                        </button>
                    </div>

                </form>
            </div>

        </div>
    </div>
</div>

<!-- FOOTER -->
<div class="footer">
    <p>Pawpal Bhutan :Easily reachable service</p>
</div>
